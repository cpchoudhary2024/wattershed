# Weekly refresh: re-screen the flagship registry against the new Drought
# Monitor release (Thursdays) and redeploy the dashboard to GitHub Pages.
# Enable Pages (Settings → Pages → GitHub Actions) for this to publish.
name: weekly-refresh

on:
  schedule:
    - cron: "0 13 * * FRI"   # Fridays 13:00 UTC, after Thursday's USDM release
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: |
          pip install -e .
          wattershed screen-all --out-dir out
          wattershed build-dashboard --results-dir out --out-file site/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4

# Wattershed hand-curated data-center site registry
# ---------------------------------------------------
# HONESTY CONTRACT for this file:
#   * Manually compiled from cited public reporting, permits, and operator
#     statements. NOT exhaustive, NOT authoritative, NOT scraped.
#   * Every load-bearing fact carries a citation (source, date, url).
#     Access date for all citations: 2026-07-16.
#   * announced_mw is recorded ONLY where a specific figure is publicly
#     reported; conflicting or unofficial figures are left null and noted.
#   * coord_precision ∈ {address, parcel-adjacent, locality}: how well the
#     point is known. Locality-precision sites inherit extra caveats in
#     screening output.
#   * cooling is the best-documented cooling family; 'unknown' where operators
#     have not disclosed. Screening always shows all cooling scenarios.
#   * rto overrides the eGRID-subregion→NERC-area crosswalk where the site's
#     actual RTO membership is publicly documented.

sites:
  - slug: xai-colossus-memphis
    name: xAI Colossus 1
    operator: xAI
    state: TN
    status: operating
    lat: 35.06008
    lon: -90.15219
    address: 3231 Paul R Lowry Rd, Memphis, TN 38109
    coord_precision: address
    announced_mw: 300
    cooling: unknown
    notes: >
      Retrofit of a former Electrolux plant in South Memphis (Boxtown area);
      became the most prominent data-center EJ controversy in the U.S. after
      unpermitted gas turbines (up to ~35) operated on-site through 2024–25.
      NAACP/SELC/Earthjustice litigation over the related Southaven (MS)
      "Colossus 2" turbine plant was active as of mid-2026. TVA's initial
      grid-service approval (Nov 2024) was 150 MW; the site's power draw is
      reported at ~300 MW in 2026 profiles — announced_mw uses the reported
      figure, so modeled demand reflects current operation, not the first
      TVA tranche.
    citations:

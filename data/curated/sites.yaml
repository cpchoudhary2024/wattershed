  - slug: meta-newton-county
    name: Meta Newton Data Center (Stanton Springs)
    operator: Meta
    state: GA
    status: operating
    lat: 33.59850
    lon: -83.80750
    address: Stanton Springs, Social Circle, GA (Newton County)
    coord_precision: locality
    announced_mw: null
    cooling: hybrid
    notes: >
      Operating campus whose construction coincided with residential well
      failures and sediment complaints in adjacent Mansfield-area homes
      (Newton County); reported ~500,000 gal/day usage ≈10% of county water
      use, with the county projecting supply deficits by 2030. A Meta-
      commissioned study disputed the well linkage; EPA said it would
      investigate after congressional pressure over drinking-water concerns
      in adjacent Morgan County (2026). Capacity not publicly disclosed
      (investment figures only), so announced_mw is null. Cooling family set
      to Meta's standard outside-air + evaporative-assist design.

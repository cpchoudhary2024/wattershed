      - title: "Colossus (data center)"
        source: Wikipedia (background/timeline)
        date: "2026"
        url: https://en.wikipedia.org/wiki/Colossus_(data_center)
      - title: "NAACP suit over Colossus gas plant; DOJ intervention"
        source: Silicon Report / press coverage
        date: "2026-06"

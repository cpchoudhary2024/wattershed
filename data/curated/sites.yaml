    cooling: unknown
    rto: MISO
    notes: >
      Meta's largest campus: ~2,250 acres, expanded July 2026 to a confirmed
      5 GW / $50B+ build-out; ~2 GW expected online by 2030. Entergy is
      building ten Meta-funded gas units totaling ≈7.5 GW for the campus
      (seven new plants ≈5.2 GW agreed March 2026, plus three previously
      approved) alongside Meta-funded renewables, storage, and 240 mi of
      transmission — the clearest case of a single data-center campus
      reshaping a state's generation fleet. One of the poorest parishes in
      Louisiana.
